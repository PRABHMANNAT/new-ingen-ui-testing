<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #ffffff; }
    .fg { fill: #000000; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0a0a0a; }
      .fg { fill: #ffffff; }
    }
  </style>
  <rect class="bg" width="100" height="100" rx="18"/>
  <g transform="translate(50 50)" class="fg">
    <rect x="-6" y="-42" width="12" height="84"/>
    <rect x="-42" y="-6" width="84" height="12"/>
    <rect x="-6" y="-42" width="12" height="84" transform="rotate(45)"/>
    <rect x="-6" y="-42" width="12" height="84" transform="rotate(-45)"/>
  </g>
</svg>
